<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/components/header.css">
    <link rel="stylesheet" href="./styles/components/footer.css">
    <link rel="stylesheet" href="./styles/components/board.css">
    <link rel="stylesheet" href="./styles/components/classicBoard.css">
    <link rel="stylesheet" href="./styles/components/ultimateBoard.css">
    <link rel="stylesheet" href="./styles/components/setupScreen.css">
    <link rel="stylesheet" href="./styles/components/helpModal.css">
    <link rel="stylesheet" href="./styles/components/loadingScreen.css">
    <link rel="stylesheet" href="./styles/components/buttons.css">
    <link rel="stylesheet" href="./styles/components/inputs.css">

    <script type="module" src="./scripts/main.js"></script>
</head>

<body>

    <header class="app-header">
        <div class="header-wrap max-content">

            <a class="brand-link" href="./index.html">
                <img class="brand-logo" src="./assets/icons/favicon.svg" alt="GameHub logo">
                <p class="hide-on-mobile brand-name">GameHub</p>
            </a>

            <div class="header-actions">
                <button id="help-btn" class="btn btn-ghost header-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="hide-on-mobile">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                    <span data-i18n="header.help">
                    </span>
                </button>

                <button id="language-btn" class="btn btn-ghost header-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="hide-on-mobile">
                        <path d="m5 8 6 6" />
                        <path d="m4 14 6-6 2-3" />
                        <path d="M2 5h12" />
                        <path d="M7 2h1" />
                        <path d="m22 22-5-10-5 10" />
                        <path d="M14 18h6" />
                    </svg>
                    <span id="language-label" data-i18n="header.language">
                    </span>
                </button>
            </div>
        </div>
    </header>

    <main id="app-main" class="app-main"></main>

    <div id="help-overlay" class="help-overlay" aria-hidden="true" closedby="any">
        <article class="help-modal">
            <h2 data-i18n="help.title"></h2>

            <section class="help-section">
                <h3 data-i18n="help.rulesTitle"></h3>
                <p data-i18n="help.goal"></p>
                <p data-i18n="help.draw"></p>
                <p data-i18n="help.starter"></p>
            </section>

            <section class="help-section">
                <h3 data-i18n="help.ultimateTitle"></h3>
                <p data-i18n="help.ultimateIntro"></p>
                <p data-i18n="help.ultimateSend"></p>
                <p data-i18n="help.ultimateFree"></p>
            </section>

            <section class="help-section">
                <h3 data-i18n="help.modesTitle"></h3>
                <p data-i18n="help.modes"></p>
            </section>

            <section class="help-section">
                <h3 data-i18n="help.difficultyTitle"></h3>
                <dl class="help-difficulty-list">
                    <dt data-i18n="setup.easy"></dt>
                    <dd data-i18n="help.difficultyEasy"></dd>
                    <dt data-i18n="setup.medium"></dt>
                    <dd data-i18n="help.difficultyMedium"></dd>
                    <dt data-i18n="setup.hard"></dt>
                    <dd data-i18n="help.difficultyHard"></dd>
                </dl>
            </section>

            <button id="help-close-btn" class="btn btn-ghost" data-i18n="help.close"></button>
        </article>
    </div>

    <footer class="app-footer">
        <div class="footer-wrap max-content">
            <a class="brand-link" href="./index.html">
                <img class="brand-logo" src="./assets/icons/favicon.svg" alt="GameHub logo">
                <p class="hide-on-mobile brand-name">GameHub</p>
            </a>

            <nav class="footer-links">
                <a href="" data-i18n="footer.imprint"></a>
                <a href="" data-i18n="footer.privacy"></a>
            </nav>
        </div>
    </footer>

</body>

</html>
